<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTunes API Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1c1c1c, #4a4a4a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #ffffff;
      font-size: 2rem;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .search-box input {
      flex: 1;
      min-width: 220px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
    }

    .search-box button {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .search-box button:hover {
      background: #005fcc;
      transform: translateY(-1px);
    }

    .message {
      margin-bottom: 20px;
      padding: 14px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

    .message.error {
      background: rgba(255, 0, 0, 0.15);
      border: 1px solid rgba(255, 0, 0, 0.4);
      color: #ffb3b3;
    }

    .message.success {
      background: rgba(0, 255, 127, 0.15);
      border: 1px solid rgba(0, 255, 127, 0.4);
      color: #c7ffd9;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
    }

    thead {
      background: rgba(0, 122, 255, 0.25);
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
    }

    th {
      color: #007aff;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 0.2s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    img.cover {
      width: 64px;
      height: 64px;
      border-radius: 8px;
    }

    a.link {
      color: #007aff;
      text-decoration: none;
      font-weight: bold;
    }

    a.link:hover {
      text-decoration: underline;
    }

    .loader {
      display: none;
      margin: 20px auto;
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #007aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>iTunes Search Dashboard</h1>

    <div class="search-box">
      <input id="searchInput" placeholder="Cerca brani, artisti..." />
      <button id="searchButton">Cerca</button>
    </div>

    <div id="message" class="message"></div>
    <div id="loader" class="loader"></div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Cover</th>
            <th>Brano</th>
            <th>Artista</th>
            <th>Album</th>
            <th>Preview</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr>
            <td colspan="6" style="text-align:center; padding: 30px; opacity: 0.7;">
              Nessun risultato
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const resultsBody = document.getElementById('resultsBody');
    const messageBox = document.getElementById('message');
    const loader = document.getElementById('loader');

    function showMessage(text, type='error') {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
      messageBox.style.display = 'block';
    }

    function hideMessage() {
      messageBox.style.display = 'none';
    }

    function showLoader() {
      loader.style.display = 'block';
    }

    function hideLoader() {
      loader.style.display = 'none';
    }

    function renderResults(results) {
      resultsBody.innerHTML = '';

      if (!results.length) {
        resultsBody.innerHTML = `<tr><td colspan='6' style='text-align:center;'>Nessun risultato trovato</td></tr>`;
        return;
      }

      results.forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td><img class="cover" src="${item.artworkUrl100}" /></td>
          <td>${item.trackName || '-'}</td>
          <td>${item.artistName || '-'}</td>
          <td>${item.collectionName || '-'}</td>
          <td>${item.previewUrl ? `<audio controls src='${item.previewUrl}'></audio>` : 'N/D'}</td>
          <td><a class="link" target="_blank" href="${item.trackViewUrl}">Apri</a></td>
        `;

        resultsBody.appendChild(row);
      });
    }

    async function searchItunes(query) {
      hideMessage();
      showLoader();

      try {
        const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=10`;

        const res = await fetch(url);

        if (!res.ok) {
          throw new Error('Errore nella richiesta iTunes API');
        }

        const data = await res.json();
        renderResults(data.results);
        showMessage('Risultati caricati', 'success');

      } catch (err) {
        console.error(err);

        resultsBody.innerHTML = `<tr><td colspan='6' style='color:red; text-align:center;'>Errore nel caricamento dati</td></tr>`;
        showMessage(err.message);

      } finally {
        hideLoader();
      }
    }

    searchButton.addEventListener('click', () => {
      const q = searchInput.value.trim();
      if (!q) return showMessage('Inserisci un termine di ricerca');
      searchItunes(q);
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') searchButton.click();
    });
  </script>
</body>
</html>
